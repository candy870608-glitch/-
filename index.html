<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健康紀錄">
<meta name="theme-color" content="#ffffff">
<title>健康紀錄</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;padding:0;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
  #root{padding-bottom:env(safe-area-inset-bottom)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;


// ── helpers ──────────────────────────────────────────────
const CIRC = 2 * Math.PI * 88;
const fmtTimer = s => { const m = Math.floor(s/60), x = s%60; return m+":"+(x<10?"0":"")+x; };

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function dateToStr(d) {
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function toTimeStr() {
  return new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});
}

function beep(){try{const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.5);o.start();o.stop(a.currentTime+0.5);}catch(e){}}

function useLS(key, init) {
  const [v, set] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const save = val => { set(val); try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };
  return [v, save];
}

const CALORIE_GOAL = 1400, PROTEIN_GOAL = 120;
const MEAL_LABELS = ["早餐","午餐","晚餐","點心"];
const MEAL_ICONS  = ["🌅","☀️","🌇","🍎"];

const C = {
  bg:"#ffffff", bgSoft:"#f7f7f5", border:"#e8e8e8", borderMid:"#b0b0b0",
  text:"#111", muted:"#777", hint:"#bbb",
  green:"#1D9E75", greenBg:"#EAF3DE", greenText:"#3B6D11",
  amber:"#BA7517", red:"#E24B4A", blue:"#185FA5",
};

const InpBase = {
  padding:"10px 8px", border:`1px solid #ddd`, borderRadius:8,
  fontSize:14, background:"#fff", color:"#111", outline:"none",
  boxSizing:"border-box", WebkitAppearance:"none", appearance:"none",
};

// ── Calendar strip ────────────────────────────────────────
function CalStrip({ selected, onSelect }) {
  const today = new Date();
  const days = Array.from({length:14}, (_,i) => {
    const d = new Date(today); d.setDate(today.getDate() - 13 + i); return d;
  });
  const ref = useRef(null);
  useEffect(() => { if(ref.current) ref.current.scrollLeft = ref.current.scrollWidth; }, []);
  const wday = ["日","一","二","三","四","五","六"];
  return (
    <div ref={ref} style={{display:"flex",gap:6,overflowX:"auto",padding:"0.75rem 1rem",
      borderBottom:`1px solid ${C.border}`,scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
      {days.map(d => {
        const ds = dateToStr(d);
        const isToday = ds === getTodayStr();
        const isSel = ds === selected;
        return (
          <button key={ds} onClick={() => onSelect(ds)}
            style={{flexShrink:0,width:44,display:"flex",flexDirection:"column",alignItems:"center",
              padding:"6px 0",borderRadius:10,border:"none",cursor:"pointer",
              background: isSel ? C.blue : "transparent",
              color: isSel ? "#fff" : isToday ? C.blue : C.muted}}>
            <span style={{fontSize:10,marginBottom:2}}>{wday[d.getDay()]}</span>
            <span style={{fontSize:15,fontWeight:isSel||isToday?600:400}}>{d.getDate()}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── TIMER ─────────────────────────────────────────────────
function TimerTab() {
  const [total, setTotal] = useState(60);
  const [rem, setRem] = useState(60);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [paused, setPaused] = useState(false);
  const iRef = useRef(null);
  const frac = rem / total;
  const offset = CIRC * (1 - frac);
  const ring = frac > 0.5 ? C.green : frac > 0.25 ? C.amber : C.red;

  function pick(s) { if(running) return; setTotal(s); setRem(s); setDone(false); setPaused(false); }
  function toggle() {
    if(done) { setDone(false); setRem(total); return; }
    if(!running) { setRunning(true); setPaused(false); } else { setRunning(false); setPaused(true); }
  }
  function reset() { clearInterval(iRef.current); setRunning(false); setPaused(false); setDone(false); setRem(total); }

  useEffect(() => {
    if(running) {
      iRef.current = setInterval(() => {
        setRem(r => { if(r<=1) { clearInterval(iRef.current); setRunning(false); setDone(true); beep(); return total; } return r-1; });
      }, 1000);
    } else clearInterval(iRef.current);
    return () => clearInterval(iRef.current);
  }, [running, total]);

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"1.5rem 1rem"}}>
      {done && <div style={{background:C.greenBg,border:`1px solid ${C.green}`,borderRadius:10,
        padding:"10px 18px",fontSize:14,color:C.greenText,marginBottom:16,width:"100%",textAlign:"center"}}>
        休息時間到！繼續下一組 💪</div>}
      <div style={{position:"relative",width:200,height:200,marginBottom:20}}>
        <svg width="200" height="200" viewBox="0 0 200 200" style={{transform:"rotate(-90deg)"}}>
          <circle cx="100" cy="100" r="88" fill="none" stroke="#eee" strokeWidth="8"/>
          <circle cx="100" cy="100" r="88" fill="none" stroke={ring} strokeWidth="8"
            strokeDasharray={CIRC} strokeDashoffset={offset} strokeLinecap="round"
            style={{transition:"stroke-dashoffset 0.9s linear,stroke 0.3s"}}/>
        </svg>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
          <div style={{fontSize:44,fontWeight:500,letterSpacing:-1}}>{fmtTimer(rem)}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>
            {done?"完成！":running?"休息中...":paused?"已暫停":"準備好了嗎"}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,width:"100%",maxWidth:280}}>
        {[60,90,120,150].map(s => (
          <button key={s} onClick={() => pick(s)} style={{flex:1,padding:"10px 0",
            border:`1px solid ${total===s?"#999":"#ddd"}`,borderRadius:8,
            background:total===s?"#f0f0f0":"transparent",fontSize:12,cursor:"pointer",
            fontWeight:total===s?600:400,color:total===s?"#111":"#777"}}>{s}秒</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,width:"100%",maxWidth:280}}>
        <button onClick={toggle} style={{flex:2,padding:13,border:"1px solid #999",borderRadius:8,
          background:"transparent",fontSize:15,fontWeight:600,cursor:"pointer",color:"#111"}}>
          {done?"再一組":running?"暫停":paused?"繼續":"開始"}
        </button>
        <button onClick={reset} style={{flex:1,padding:13,border:"1px solid #ddd",borderRadius:8,
          background:"transparent",fontSize:14,cursor:"pointer",color:"#777"}}>重設</button>
      </div>
    </div>
  );
}

// ── WORKOUT ───────────────────────────────────────────────
function WorkoutTab() {
  const [entries, setEntries] = useLS("wt_v3", []);
  const [selDate, setSelDate] = useState(getTodayStr());
  const [name, setName] = useState("");
  const [weight, setWeight] = useState("");
  const [reps, setReps] = useState("");
  const [expanded, setExpanded] = useState({});
  const [err, setErr] = useState("");

  function add() {
    const w = parseFloat(weight);
    const r = parseInt(reps);
    if(!name.trim()) { setErr("請填入動作名稱"); return; }
    if(isNaN(w) || w <= 0) { setErr("請填入正確重量"); return; }
    if(isNaN(r) || r <= 0) { setErr("請填入次數"); return; }
    setErr("");
    const newEntry = { id: String(Date.now()), name: name.trim(), weight: w, reps: r, date: selDate, time: toTimeStr() };
    setEntries([...entries, newEntry]);
    // keep name & weight; only clear reps
    setReps("");
    setExpanded(x => ({...x, [name.trim()]: true}));
  }

  const dayList = entries.filter(e => e.date === selDate);
  const groups = {};
  dayList.forEach(e => { if(!groups[e.name]) groups[e.name] = []; groups[e.name].push(e); });

  function del(id) { setEntries(entries.filter(e => e.id !== id)); }

  return (
    <div>
      <CalStrip selected={selDate} onSelect={d => { setSelDate(d); setErr(""); }} />
      <div style={{padding:"0.75rem 1rem 1.5rem"}}>

        <div style={{background:"#f5f5f5",borderRadius:12,padding:"1rem",marginBottom:16,border:"1px solid #e0e0e0"}}>
          <input value={name} onChange={e => setName(e.target.value)}
            placeholder="動作名稱（深蹲、臥推...）"
            style={{...InpBase, width:"100%", marginBottom:8, fontSize:15}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <input value={weight} onChange={e => setWeight(e.target.value)}
              placeholder="重量(kg)" inputMode="decimal" style={InpBase}/>
            <input value={reps} onChange={e => setReps(e.target.value)}
              placeholder="次數" inputMode="numeric" style={InpBase}/>
          </div>
          {err && <div style={{fontSize:12,color:C.red,marginBottom:6}}>{err}</div>}
          <button
            onClick={add}
            style={{width:"100%",padding:12,border:"1px solid #999",borderRadius:8,
              background:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",color:"#111",
              WebkitTapHighlightColor:"transparent"}}>
            + 加入紀錄
          </button>
        </div>

        {Object.keys(groups).length === 0
          ? <div style={{textAlign:"center",padding:"2rem",color:C.hint,fontSize:14}}>這天還沒有訓練紀錄</div>
          : Object.entries(groups).map(([gname, glist]) => {
            const isOpen = expanded[gname];
            const totalVol = glist.reduce((s,e) => s + e.weight*e.reps, 0);
            return (
              <div key={gname} style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
                <button onClick={() => setExpanded(x => ({...x,[gname]:!x[gname]}))}
                  style={{width:"100%",padding:"12px 14px",display:"flex",justifyContent:"space-between",
                    alignItems:"center",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",
                    WebkitTapHighlightColor:"transparent"}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:600,color:"#111"}}>{gname}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:2}}>
                      {glist.length} 組・總量 {Math.round(totalVol)} kg
                    </div>
                  </div>
                  <span style={{color:C.hint,fontSize:16,display:"inline-block",
                    transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▼</span>
                </button>
                {isOpen && (
                  <div style={{borderTop:"1px solid #e0e0e0"}}>
                    {glist.map((e,i) => (
                      <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"10px 14px",borderBottom:i<glist.length-1?"1px solid #eee":"none",
                        background:i%2===0?"#fafafa":"#fff"}}>
                        <div style={{fontSize:13}}>
                          <span style={{fontWeight:600}}>第{i+1}組</span>
                          <span style={{color:C.muted,marginLeft:8}}>{e.weight}kg × {e.reps}次</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:11,color:C.hint}}>{e.time}</span>
                          <button onClick={() => del(e.id)} style={{background:"none",border:"none",
                            cursor:"pointer",fontSize:18,color:"#ccc",padding:"2px 6px",lineHeight:1}}>×</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

// ── FOOD ──────────────────────────────────────────────────
function FoodTab() {
  const [entries, setEntries] = useLS("food_v3", []);
  const [selDate, setSelDate] = useState(getTodayStr());
  const [selMeal, setSelMeal] = useState(0);
  const [name, setName] = useState("");
  const [cal, setCal] = useState("");
  const [pro, setPro] = useState("");
  const [expanded, setExpanded] = useState({0:true,1:true,2:true,3:true});

  const isToday = selDate === getTodayStr();
  const dayList = entries.filter(e => e.date === selDate);
  const totalCal  = dayList.reduce((s,e) => s+e.cal, 0);
  const totalPro  = dayList.reduce((s,e) => s+e.protein, 0);
  function add() {
    if(!name.trim() || !cal) return;
    setEntries([...entries, {
      id: String(Date.now()), date: selDate, time: toTimeStr(), meal: selMeal,
      name: name.trim(), cal: parseInt(cal)||0, protein: parseInt(pro)||0,
    }]);
    setName(""); setCal(""); setPro("");
  }
  function del(id) { setEntries(entries.filter(e => e.id !== id)); }

  const SmInp = {
    ...InpBase, fontSize:13, padding:"9px 6px", background:"#fff",
  };

  return (
    <div>
      <CalStrip selected={selDate} onSelect={setSelDate}/>
      <div style={{padding:"0.75rem 1rem 1.5rem"}}>

        {/* summary */}
        <div style={{background:"#f5f5f5",borderRadius:12,padding:"12px 14px",marginBottom:12,border:"1px solid #e0e0e0"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
            {[["卡路里",Math.round(totalCal),CALORIE_GOAL,"kcal",C.amber],
              ["蛋白質",Math.round(totalPro),PROTEIN_GOAL,"g",C.blue]].map(([l,v,g,u,col]) => (
              <div key={l}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:12,color:C.muted}}>{l}</span>
                  <span style={{fontSize:12,color:C.muted}}>{v}/{g}{u}</span>
                </div>
                <div style={{background:"#ddd",borderRadius:4,height:5}}>
                  <div style={{background:col,borderRadius:4,height:5,width:`${Math.min(v/g,1)*100}%`,transition:"width 0.4s"}}/>
                </div>
              </div>
            ))}
          </div>

        </div>

        {/* 拍照提示 */}
        <div style={{background:"#fffbe6",border:"1px solid #f0d060",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#7a5c00"}}>
          📷 想用拍照辨識？直接把食物照片傳到對話框，我幫你估算熱量＋蛋白質，再填到這裡
        </div>

        {/* input — only today */}
        {isToday && (
          <div style={{background:"#f5f5f5",borderRadius:12,padding:"1rem",marginBottom:16,border:"1px solid #e0e0e0"}}>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              {MEAL_LABELS.map((l,i) => (
                <button key={l} onClick={() => setSelMeal(i)} style={{flex:1,padding:"7px 0",
                  border:`1px solid ${selMeal===i?"#999":"#ddd"}`,borderRadius:8,
                  background:selMeal===i?"#fff":"transparent",fontSize:12,cursor:"pointer",
                  fontWeight:selMeal===i?600:400,color:selMeal===i?"#111":"#777",
                  WebkitTapHighlightColor:"transparent"}}>
                  {MEAL_ICONS[i]} {l}
                </button>
              ))}
            </div>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="食物名稱"
              style={{...InpBase,width:"100%",marginBottom:8,fontSize:15}}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
              <input value={cal} onChange={e=>setCal(e.target.value)} placeholder="熱量 kcal" inputMode="numeric" style={SmInp}/>
              <input value={pro} onChange={e=>setPro(e.target.value)} placeholder="蛋白質 g"  inputMode="numeric" style={SmInp}/>
            </div>
            <button onClick={add} style={{width:"100%",padding:12,border:"1px solid #999",borderRadius:8,
              background:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",color:"#111",
              WebkitTapHighlightColor:"transparent"}}>
              + 加入紀錄
            </button>
          </div>
        )}

        {/* meal groups */}
        {MEAL_LABELS.map((label, mi) => {
          const mList = dayList.filter(e => e.meal === mi);
          const mCal  = mList.reduce((s,e) => s+e.cal, 0);
          const mPro  = mList.reduce((s,e) => s+e.protein, 0);
          const isOpen = expanded[mi];
          return (
            <div key={mi} style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
              <button onClick={() => setExpanded(x => ({...x,[mi]:!x[mi]}))}
                style={{width:"100%",padding:"12px 14px",display:"flex",justifyContent:"space-between",
                  alignItems:"center",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",
                  WebkitTapHighlightColor:"transparent"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>{MEAL_ICONS[mi]}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:"#111"}}>{label}</div>
                    {mList.length > 0 &&
                      <div style={{fontSize:12,color:C.muted,marginTop:1}}>{Math.round(mCal)} kcal・蛋白 {Math.round(mPro)}g</div>}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:13,fontWeight:600,color:mCal>0?"#111":C.hint}}>{mCal>0?Math.round(mCal)+"kcal":"–"}</span>
                  <span style={{color:C.hint,fontSize:14,display:"inline-block",
                    transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▼</span>
                </div>
              </button>
              {isOpen && (
                <div style={{borderTop:"1px solid #eee"}}>
                  {mList.length === 0
                    ? <div style={{padding:"12px 14px",fontSize:13,color:C.hint,textAlign:"center"}}>尚無紀錄</div>
                    : mList.map((e,i) => (
                      <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"10px 14px",borderBottom:i<mList.length-1?"1px solid #eee":"none",
                        background:i%2===0?"#fafafa":"#fff"}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:500}}>{e.name}</div>
                          <div style={{fontSize:11,color:C.muted,marginTop:2}}>蛋白質 {e.protein}g</div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:13,fontWeight:600}}>{e.cal}kcal</div>
                            <div style={{fontSize:11,color:C.hint}}>{e.time}</div>
                          </div>
                          <button onClick={() => del(e.id)} style={{background:"none",border:"none",
                            cursor:"pointer",fontSize:18,color:"#ccc",padding:"2px 6px",lineHeight:1}}>×</button>
                        </div>
                      </div>
                    ))
                  }
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── WEIGHT ────────────────────────────────────────────────
function WeightTab() {
  const [entries, setEntries] = useLS("weight_v3", []);
  const [val, setVal] = useState("");
  const today = getTodayStr();

  function add() {
    if(!val) return;
    const w = parseFloat(val); if(isNaN(w)) return;
    const existing = entries.findIndex(e => e.date === today);
    const next = [...entries];
    if(existing >= 0) next[existing] = {...next[existing], weight: w};
    else next.push({id:String(Date.now()), date:today, weight:w});
    next.sort((a,b) => a.date.localeCompare(b.date));
    setEntries(next); setVal("");
  }
  function del(id) { setEntries(entries.filter(e => e.id !== id)); }

  const latest = entries[entries.length-1];
  const prev   = entries[entries.length-2];
  const diff   = latest && prev ? (latest.weight - prev.weight).toFixed(1) : null;
  const chartData = entries.slice(-30).map(e => ({date:e.date.slice(5), weight:e.weight}));

  return (
    <div style={{padding:"0.75rem 1rem 1.5rem"}}>
      {latest && (
        <div style={{background:"#f5f5f5",borderRadius:12,padding:"1rem",marginBottom:12,
          display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid #e0e0e0"}}>
          <div>
            <div style={{fontSize:12,color:C.muted,marginBottom:4}}>最新體重</div>
            <div style={{fontSize:32,fontWeight:600}}>{latest.weight}<span style={{fontSize:14,color:C.muted,marginLeft:4}}>kg</span></div>
            <div style={{fontSize:12,color:C.muted}}>{latest.date}</div>
          </div>
          {diff !== null && (
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:4}}>與前次</div>
              <div style={{fontSize:22,fontWeight:600,color:parseFloat(diff)<0?C.green:parseFloat(diff)>0?C.red:C.muted}}>
                {parseFloat(diff)>0?"+":""}{diff} kg
              </div>
            </div>
          )}
        </div>
      )}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <input value={val} onChange={e=>setVal(e.target.value)} placeholder="今日體重 (kg)" inputMode="decimal"
          style={{...InpBase,flex:1}}/>
        <button onClick={add} style={{width:72,padding:10,border:"1px solid #999",borderRadius:8,
          background:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",color:"#111",
          WebkitTapHighlightColor:"transparent"}}>記錄</button>
      </div>

      {chartData.length >= 2 && (
        <div style={{background:"#f5f5f5",borderRadius:12,padding:"1rem",marginBottom:16,border:"1px solid #e0e0e0"}}>
          <div style={{fontSize:12,color:C.muted,marginBottom:10,fontWeight:600}}>近期趨勢</div>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={chartData} margin={{top:4,right:8,left:-20,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
              <XAxis dataKey="date" tick={{fontSize:10,fill:"#bbb"}} interval="preserveStartEnd"/>
              <YAxis tick={{fontSize:10,fill:"#bbb"}} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{fontSize:12,borderRadius:8,border:"1px solid #eee"}}/>
              <Line type="monotone" dataKey="weight" stroke={C.blue} strokeWidth={2}
                dot={{r:3,fill:C.blue}} activeDot={{r:5}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      )}

      <div style={{fontSize:12,color:C.muted,marginBottom:10,fontWeight:600}}>所有紀錄</div>
      {entries.length === 0
        ? <div style={{textAlign:"center",padding:"2rem",color:C.hint,fontSize:14}}>還沒有體重紀錄</div>
        : [...entries].reverse().map(e => (
          <div key={e.id} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:8,
            padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:14}}>{e.date}</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:15,fontWeight:600}}>{e.weight} kg</div>
              <button onClick={()=>del(e.id)} style={{background:"none",border:"none",
                cursor:"pointer",fontSize:18,color:"#ccc",padding:"2px 6px",lineHeight:1}}>×</button>
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ── SHELL ─────────────────────────────────────────────────
const TABS = [{id:"timer",label:"計時"},{id:"workout",label:"訓練"},{id:"food",label:"飲食"},{id:"weight",label:"體重"}];

  const [tab, setTab] = useState("timer");
  return (
    <div style={{maxWidth:480,margin:"0 auto",fontFamily:"-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif",
      color:"#111",background:"#fff",minHeight:"100vh"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,padding:"0.75rem 1rem",
        borderBottom:"1px solid #e8e8e8",position:"sticky",top:0,background:"#fff",zIndex:10}}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{padding:"9px 0",
            border:`1px solid ${tab===t.id?"#999":"#ddd"}`,borderRadius:8,
            background:tab===t.id?"#f0f0f0":"transparent",fontSize:13,cursor:"pointer",
            fontWeight:tab===t.id?600:400,color:tab===t.id?"#111":"#777",
            WebkitTapHighlightColor:"transparent"}}>
            {t.label}
          </button>
        ))}
      </div>
      <div>
        {tab==="timer"   && <TimerTab/>}
        {tab==="workout" && <WorkoutTab/>}
        {tab==="food"    && <FoodTab/>}
        {tab==="weight"  && <WeightTab/>}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
