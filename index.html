<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健康紀錄">
<meta name="theme-color" content="#f0ede8">
<title>健康紀錄</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{background:#f0ede8}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f0ede8;color:#2d2d2d;max-width:480px;margin:0 auto;min-height:100vh}
#root{padding-bottom:env(safe-area-inset-bottom,16px)}
.nav{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;border-bottom:1px solid #e2ddd8;position:sticky;top:0;background:#f0ede8;z-index:10}
.nav button{padding:9px 0;border:1px solid #ddd;border-radius:12px;background:transparent;font-size:12px;cursor:pointer;color:#999;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.3}
.nav button.active{border-color:#c9b8a8;background:#fff8f3;color:#5a3e2b;font-weight:600}
.tab{display:none;padding:12px 14px 32px}
.tab.active{display:block}
input{width:100%;padding:10px 8px;border:1px solid #e0d8d0;border-radius:10px;font-size:14px;font-family:inherit;background:#fffcf9;color:#2d2d2d;outline:none;-webkit-appearance:none}
button{font-family:inherit;cursor:pointer}
.card{background:#fffcf9;border-radius:16px;padding:14px;margin-bottom:12px;border:1px solid #e8e0d8;box-shadow:0 2px 8px rgba(180,150,120,0.07)}
.btn-main{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#c9a882,#a07850);font-size:15px;font-weight:600;color:#fff;margin-top:8px;letter-spacing:.3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.label{font-size:12px;color:#777;margin-bottom:4px}
.hint{font-size:12px;color:#aaa}
.err{font-size:12px;color:#e24b4a;margin:4px 0}
.group-hd{width:100%;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:transparent;border:none;text-align:left;cursor:pointer}
.group-body{border-top:1px solid #f0e8e0}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #f5ede6}
.row:last-child{border-bottom:none}
.row:nth-child(even){background:#fff8f3}
.del-btn{background:none;border:none;font-size:18px;color:#d4b8a8;padding:2px 6px;line-height:1}
.empty{text-align:center;padding:32px;color:#bbb;font-size:14px}
.bar-bg{background:#e8ddd4;border-radius:4px;height:5px;margin-top:6px}
.bar-fill{height:5px;border-radius:4px;transition:width .4s}
.meal-hd{width:100%;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:transparent;border:none;cursor:pointer;text-align:left}
.pill{flex:1;padding:7px 0;border:1px solid #ddd;border-radius:8px;background:transparent;font-size:12px;color:#777}
.pill.active{border-color:#c9a882;background:#fff8f0;color:#7a5030;font-weight:600}
.info-box{background:#fffbe6;border:1px solid #f0d060;border-radius:10px;padding:10px 14px;font-size:13px;color:#7a5c00;margin-bottom:12px}
/* Timer */
.timer-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.ring-cont{position:relative;width:200px;height:200px;margin-bottom:20px}
.timer-num{font-size:44px;font-weight:500;letter-spacing:-1px}
.t-label{font-size:12px;color:#777;margin-top:4px}
.seg-btns{display:flex;gap:8px;width:100%;max-width:280px;margin-bottom:16px}
.seg-btn{flex:1;padding:10px 0;border:1px solid #ddd;border-radius:8px;background:transparent;font-size:12px;color:#777}
.seg-btn.active{border-color:#c9a882;background:#fff8f0;color:#7a5030;font-weight:600}
.ctrl-btns{display:flex;gap:8px;width:100%;max-width:280px}
.done-banner{background:#fef4e8;border:1px solid #e0a86a;border-radius:10px;padding:10px 18px;font-size:14px;color:#7a4f20;margin-bottom:16px;width:100%;text-align:center}
/* Cal strip */
.cal-strip{display:flex;gap:6px;overflow-x:auto;padding:10px 12px;border-bottom:1px solid #eee;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cal-strip::-webkit-scrollbar{display:none}
.cal-day{flex-shrink:0;width:44px;display:flex;flex-direction:column;align-items:center;padding:6px 0;border-radius:10px;border:none;background:transparent;cursor:pointer;font-family:inherit}
.cal-day .wd{font-size:10px;color:#aaa;margin-bottom:2px}
.cal-day .dd{font-size:15px;color:#777}
.cal-day.today .dd{color:#c9a882;font-weight:600}
.cal-day.selected{background:#c9a882}
.cal-day.selected .wd,.cal-day.selected .dd{color:#fff;font-weight:600}
canvas{width:100%;height:160px;display:block}
</style>
</head>
<body>
<div id="root">
  <nav class="nav">
    <button onclick="showTab('timer')" id="nb-timer" class="active"><span>⏱️</span>計時</button>
    <button onclick="showTab('workout')" id="nb-workout"><span>🏋️</span>訓練</button>
    <button onclick="showTab('food')" id="nb-food"><span>🥗</span>飲食</button>
    <button onclick="showTab('weight')" id="nb-weight"><span>⚖️</span>體重</button>
  </nav>

  <!-- TIMER -->

  <div id="tab-timer" class="tab active">
    <div class="timer-wrap">
      <div id="done-banner" class="done-banner" style="display:none">休息時間到！繼續下一組 💪</div>
      <div class="ring-cont">
        <svg width="200" height="200" viewBox="0 0 200 200" style="transform:rotate(-90deg)">
          <circle cx="100" cy="100" r="88" fill="none" stroke="#eee" stroke-width="8"/>
          <circle id="ring" cx="100" cy="100" r="88" fill="none" stroke="#c9a882" stroke-width="8"
            stroke-dasharray="553" stroke-dashoffset="0" stroke-linecap="round"
            style="transition:stroke-dashoffset .9s linear,stroke .3s"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
          <div class="timer-num" id="timer-display">1:00</div>
          <div class="t-label" id="timer-label">準備好了嗎</div>
        </div>
      </div>
      <div class="seg-btns">
        <button class="seg-btn active" onclick="pickRest(60,this)">60秒</button>
        <button class="seg-btn" onclick="pickRest(90,this)">90秒</button>
        <button class="seg-btn" onclick="pickRest(120,this)">120秒</button>
        <button class="seg-btn" onclick="pickRest(150,this)">150秒</button>
      </div>
      <div class="ctrl-btns">
        <button class="btn-main" id="btn-toggle" onclick="toggleTimer()" style="flex:2;margin-top:0">開始</button>
        <button onclick="resetTimer()" style="flex:1;padding:13px;border:1px solid #e0d8d0;border-radius:12px;background:transparent;font-size:14px;color:#999">重設</button>
      </div>
    </div>
  </div>

  <!-- WORKOUT -->

  <div id="tab-workout" class="tab">
    <div id="wk-cal" class="cal-strip"></div>
    <div style="padding:12px 0">
      <div class="card">
        <input id="wk-name" placeholder="動作名稱（深蹲、臥推...）" style="margin-bottom:8px">
        <div class="grid2" style="margin-bottom:8px">
          <input id="wk-weight" placeholder="重量 (kg)" inputmode="decimal">
          <input id="wk-reps" placeholder="次數" inputmode="numeric">
        </div>
        <div class="err" id="wk-err"></div>
        <button class="btn-main" onclick="addWorkout()">+ 加入紀錄</button>
      </div>
      <div id="wk-list"></div>
    </div>
  </div>

  <!-- FOOD -->

  <div id="tab-food" class="tab">
    <div id="fd-cal" class="cal-strip"></div>
    <div style="padding:12px 0">
      <div id="fd-summary" class="card"></div>
      <div class="info-box">📷 想用拍照辨識？把食物照片傳到對話框，我幫你估算熱量＋蛋白質，再填到這裡</div>
      <div id="fd-form"></div>
      <div id="fd-list"></div>
    </div>
  </div>

  <!-- WEIGHT -->

  <div id="tab-weight" class="tab">
    <div id="wt-latest" class="card" style="display:none"></div>
    <div class="grid2" style="margin-bottom:12px">
      <input id="wt-input" placeholder="今日體重 (kg)" inputmode="decimal">
      <button onclick="addWeight()" style="padding:10px;border:none;border-radius:12px;background:linear-gradient(135deg,#c9a882,#a07850);font-size:14px;font-weight:600;color:#fff">記錄</button>
    </div>
    <div id="wt-chart-wrap" class="card" style="display:none">
      <div class="label" style="margin-bottom:8px;font-weight:600">近期趨勢</div>
      <canvas id="wt-chart"></canvas>
    </div>
    <div class="label" style="font-weight:600;margin-bottom:8px">所有紀錄</div>
    <div id="wt-list"></div>
  </div>
</div>

<script>
// ── storage ──────────────────────────────────────────────
function ls(key,def){try{var v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function sv(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

// ── date helpers ──────────────────────────────────────────
function todayStr(){var d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();}
function timeStr(){return new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
var WDAY=['日','一','二','三','四','五','六'];

// ── tab ───────────────────────────────────────────────────
var currentTab='timer';
function showTab(t){
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav button').forEach(function(el){el.classList.remove('active');});
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('nb-'+t).classList.add('active');
  currentTab=t;
  if(t==='workout')renderWorkout();
  if(t==='food')renderFood();
  if(t==='weight')renderWeight();
}

// ── calendar strip ────────────────────────────────────────
var wkDate=todayStr(), fdDate=todayStr();
function buildCal(containerId, current, onChange){
  var el=document.getElementById(containerId);
  el.innerHTML='';
  var today=new Date();
  for(var i=13
