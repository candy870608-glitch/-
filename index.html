<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Health Tracking Application</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .container { max-width: 800px; margin: auto; padding: 20px; }\n        input, button { padding: 10px; margin: 5px; font-size: 16px; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Health Tracking Application</h1>\n        <section>\n            <h2>Exercise Logging</h2>\n            <input type="text" id="exercise" placeholder="Enter exercise name"/>\n            <input type="number" id="duration" placeholder="Duration (minutes)"/>\n            <button onclick="logExercise()">Log Exercise</button>\n            <ul id="exercise-log"></ul>\n        </section>\n        <section>\n            <h2>Diet Tracking</h2>\n            <input type="text" id="food" placeholder="Enter food item"/>\n            <input type="number" id="calories" placeholder="Calories"/>\n            <button onclick="logDiet()">Log Food</button>\n            <ul id="diet-log"></ul>\n        </section>\n        <section>\n            <h2>Timer</h2>\n            <input type="number" id="timer-minutes" placeholder="Minutes"/>\n            <button onclick="startTimer()">Start Timer</button>\n            <div id="timer-display"></div>\n        </section>\n    </div>\n    <script>\n        function logExercise() {\n            const exercise = document.getElementById('exercise').value;\n            const duration = document.getElementById('duration').value;\n            const log = document.getElementById('exercise-log');\n            const li = document.createElement('li');\n            li.textContent = \", '' + exercise + ' for ' + duration + ' minutes';\n            log.appendChild(li);\n            document.getElementById('exercise').value = '';\n            document.getElementById('duration').value = '';\n        }\n        function logDiet() {\n            const food = document.getElementById('food').value;\n            const calories = document.getElementById('calories').value;\n            const log = document.getElementById('diet-log');\n            const li = document.createElement('li');\n            li.textContent = \", '' + food + ' - ' + calories + ' calories';\n            log.appendChild(li);\n            document.getElementById('food').value = '';\n            document.getElementById('calories').value = '';\n        }\n        function startTimer() {\n            let minutes = parseInt(document.getElementById('timer-minutes').value);\n            let seconds = minutes * 60;\n            const display = document.getElementById('timer-display');\n            const timer = setInterval(() => {\n                if (seconds <= 0) {\n                    clearInterval(timer);\n                    display.textContent = 'Time is up!';\n                } else {\n                    let mins = Math.floor(seconds / 60);\n                    let secs = seconds % 60;\n                    display.textContent = \"\" + mins + ':' + (secs < 10 ? '0' : '') + secs;\n                    seconds--;\n                }\n            }, 1000);\n        }\n    <\/script>\n</body>\n</html>
